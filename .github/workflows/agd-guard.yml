name: AGD Guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  guard:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate AGD docs
        run: |
          .\00_agd\agd_en.exe check-all 00_agd\agd_docs --strict
          .\00_agd\agd_en.exe check-all 00_agd\examples --strict
